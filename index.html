<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Where's Matt - AT Thru-Hike Tracker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="timeline">
      <h2>Timeline</h2>
      <div id="timeline-entries">Loading...</div>
    </div>
    <div id="map"></div>
    <div id="stats">
      <h1>Where's Matt</h1>
      <div id="miles">Loading...</div>
      <div id="last-update"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // Initialize map centered on the Appalachian Trail
      const map = L.map("map").setView([37.5, -79], 6);

      // Add OpenStreetMap tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      const TRAIL_COLORS = ["#228B22", "#1565C0", "#C62828", "#6A0DAD", "#E65100", "#00838F"];

      // Load trail data
      fetch("trail.json")
        .then((response) => response.json())
        .then((trailData) => {
          L.geoJSON(trailData, {
            style: {
              color: "#8B4513",
              weight: 3,
              opacity: 0.7,
            },
          }).addTo(map);
        })
        .catch((err) => console.log("Trail data not loaded:", err));

      // Load progress data
      fetch("progress.json")
        .then((response) => response.json())
        .then((entries) => {
          if (entries.length === 0) {
            document.getElementById("miles").textContent = "No entries yet";
            document.getElementById("timeline-entries").textContent = "No entries yet.";
            return;
          }

          // Group entries by trail name, preserving original indices
          const trailMap = {};
          entries.forEach((entry, index) => {
            const name = entry.trail || "Unknown";
            if (!trailMap[name]) trailMap[name] = [];
            trailMap[name].push({ entry, index });
          });

          const trailNames = Object.keys(trailMap);
          const colorMap = {};
          trailNames.forEach((name, i) => {
            colorMap[name] = TRAIL_COLORS[i % TRAIL_COLORS.length];
          });

          // markers array indexed by original entry index
          const markers = new Array(entries.length);

          trailNames.forEach((trailName) => {
            const color = colorMap[trailName];
            const trailEntries = trailMap[trailName];

            trailEntries.forEach(({ entry, index }, i) => {
              const isLatest = i === trailEntries.length - 1;
              const size = isLatest ? 16 : 12;

              const icon = L.divIcon({
                className: "marker-icon",
                html: `<div class="marker-dot${isLatest ? " marker-dot-current" : ""}" style="width:${size}px;height:${size}px;background:${color}"></div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
              });

              const marker = L.marker([entry.lat, entry.lng], { icon }).addTo(map)
                .bindPopup(`
                  <strong>${entry.date}${entry.time ? " " + entry.time : ""}</strong><br>
                  <span style="color:${color};font-weight:600">${trailName}</span> — Mile ${entry.mile}<br>
                  ${entry.notes}
                `, { maxHeight: 200 });

              markers[index] = marker;
              if (isLatest) marker.openPopup();
            });

            // Draw progress line for this trail
            if (trailEntries.length > 1) {
              const line = trailEntries.map(({ entry }) => [entry.lat, entry.lng]);
              L.polyline(line, { color, weight: 4, opacity: 0.8 }).addTo(map);
            }
          });

          // Update stats with most recent entry
          const latest = entries[entries.length - 1];
          const latestTrail = latest.trail || "Unknown";
          const latestColor = colorMap[latestTrail];
          document.getElementById("miles").innerHTML =
            `Mile ${latest.mile} — <span style="color:${latestColor}">${latestTrail}</span>`;
          document.getElementById("last-update").textContent =
            `Last update: ${latest.date}`;

          // Build timeline — all entries sorted newest-first
          const timelineEl = document.getElementById("timeline-entries");
          timelineEl.innerHTML = "";
          const sortedIndices = [...entries.keys()].sort((a, b) => {
            const da = entries[a].date + (entries[a].time || "");
            const db = entries[b].date + (entries[b].time || "");
            return db.localeCompare(da);
          });

          sortedIndices.forEach((i) => {
            const entry = entries[i];
            const trailName = entry.trail || "Unknown";
            const color = colorMap[trailName];

            const card = document.createElement("div");
            card.className = "timeline-card";
            card.style.borderLeft = `3px solid ${color}`;

            const header = document.createElement("div");
            header.className = "timeline-card-header";
            header.textContent = entry.date + (entry.time ? " " + entry.time : "");

            const badge = document.createElement("div");
            badge.className = "timeline-card-trail";
            badge.textContent = trailName;
            badge.style.color = color;

            const mile = document.createElement("div");
            mile.className = "timeline-card-mile";
            mile.textContent = "Mile " + entry.mile;

            const notes = document.createElement("div");
            notes.className = "timeline-card-notes";
            notes.textContent = entry.notes;

            card.appendChild(header);
            card.appendChild(badge);
            card.appendChild(mile);
            card.appendChild(notes);

            card.addEventListener("click", () => {
              map.setView([entries[i].lat, entries[i].lng], 13);
              if (markers[i]) markers[i].openPopup();
            });

            timelineEl.appendChild(card);
          });

          // Center map on latest position
          map.setView([latest.lat, latest.lng], 10);
        })
        .catch((err) => {
          console.error("Error loading progress:", err);
          document.getElementById("miles").textContent = "Error loading data";
        });
    </script>
  </body>
</html>
